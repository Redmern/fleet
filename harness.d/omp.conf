# harness.d/omp.conf — oh-my-pi (omp.sh), a Pi-family terminal coding agent.
# NOTE: `omp` the binary also names oh-my-posh (a shell prompt) — this is the
# coding agent from https://omp.sh, installed to ~/.local/bin/omp.
#
# omp has no Claude-style hook system and no runtime permission-mode cycle, so
# fleet derives its state by scraping the pane (working = the interrupt hint is
# visible) and reads cost from omp's own session JSONL. Mode/guard are gated off
# until omp grows an external integration point.

H_BIN="omp"
# omp auto-switches OUT of $HOME to a temp dir unless --allow-home. A fleet
# command center is often rooted at ~ (or a subdir), and the orchestrator MUST
# stay in the project root to see the repos + read its CLAUDE.md/AGENTS.md guide.
# Without this, an omp orchestrator launches blind. Harmless outside ~.
H_ARGS="--allow-home"
H_PROMPT_FLAG=""                   # prompt is positional → interactive seeded
                                   # session (omp "prompt"). `-p/--print` is omp's
                                   # non-interactive mode (answer once and exit).
H_TERM_MATCH="omp"
H_NVIM_PLUGIN=0                     # plain :terminal omp (no claudecode.nvim)
H_STATE_SRC="scrape"               # fleetd polls capture-pane against H_BUSY_RE
H_MODE_KEYS=""                     # no runtime perm-mode cycle → mode pill hidden
H_MODE_LIST=""
H_COST_KIND="omp-session"          # ~/.omp/agent/sessions/**/*.jsonl usage objects
H_GUARD_KIND="none"                # no PreToolUse equivalent yet
# Working when the interrupt affordance is on screen. Theme-customisable, so we
# match the stable parts (the esc-to-interrupt hint) case-insensitively.
H_BUSY_RE="esc to interrupt|interrupt ·|working|compacting"
