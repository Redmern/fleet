# harness.d/claude.conf — Anthropic Claude Code. The reference harness.
# Sourced by `fleet` into H_* vars. Every key has a built-in default in
# harness_load(); a conf only needs to override what differs.

H_BIN="claude-profile claude"   # launch candidates, first on PATH wins
H_PROMPT_FLAG=""               # flag for the initial prompt ("" = positional arg)
H_TERM_MATCH="claude"          # nvim :terminal buffer-name substring (FleetSend)
H_NVIM_PLUGIN=1                # autostart via claudecode.nvim (vs generic :terminal)
H_STATE_SRC="hook"            # state comes from Claude Code hooks → fleetd
H_MODE_KEYS=$'\033[Z'          # Shift+Tab cycles the permission mode
H_MODE_LIST="default accept-edits auto plan bypass"
H_START_MODE="auto"            # start agents in this --permission-mode ("" = leave
                               # claude's default). Values: default|acceptEdits|auto|bypassPermissions
H_COST_KIND="claude-tx"        # cost_for_pane: sum the transcript JSONL
H_GUARD_KIND="hook"            # fleet-guard PreToolUse hook
H_BUSY_RE=""                   # unused (state is hook-driven, not scraped)
